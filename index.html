<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gvsh</title>
  <meta name="description" content="gvsh — games, anime, manga and music." />
  <style>
    :root {
      --bg: #0c0c0d;
      --fg: #ececed;
      --dim: #9a9ca0;
      --muted: #6d6f73;
      --tile: #161619;
      --line: rgba(255, 255, 255, 0.08);
      --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      display: grid;
      place-items: center;
      min-height: 100svh;
      padding: clamp(1.25rem, 3.5vw, 2.75rem);
    }

    .card { width: 100%; max-width: 1040px; }

    /* Header */
    header { margin-bottom: clamp(1.5rem, 3.5vh, 2.5rem); }

    .name {
      font-size: clamp(2.4rem, 7vw, 3.6rem);
      font-weight: 650;
      letter-spacing: -0.02em;
      line-height: 1;
      margin: 0;
    }

    .tagline {
      margin: 0.9rem 0 0;
      font-family: var(--mono);
      font-size: 0.74rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .links {
      margin-top: 1.05rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .links a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .links a:hover,
    .links a:focus-visible { color: var(--fg); }

    /* Section labels */
    h2 {
      margin: 0 0 1rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .played {
      border-top: 1px solid var(--line);
      padding-top: clamp(1.5rem, 3.5vh, 2.25rem);
    }

    /* Game cover cards — single fitted row on desktop */
    .cards {
      display: flex;
      align-items: flex-start;
      gap: clamp(8px, 1vw, 14px);
    }

    .game {
      flex: 1 1 0;
      min-width: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .game figcaption {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
      text-align: center;
    }

    .game .t {
      display: block;
      min-width: 0;
      font-size: clamp(0.7rem, 0.95vw, 0.82rem);
      line-height: 1.25;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .game .h {
      display: block;
      max-width: 100%;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cover {
      display: block;
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--tile);
      transition: transform 0.3s cubic-bezier(0.2, 0.7, 0.2, 1), box-shadow 0.3s ease;
    }
    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.25s ease;
      opacity: 0.92;
    }
    .cover:hover,
    .cover:focus-visible {
      transform: translateY(-5px);
      box-shadow: 0 16px 34px -16px rgba(0, 0, 0, 0.8);
      outline: none;
    }
    .cover:hover img,
    .cover:focus-visible img { opacity: 1; }
    .cover:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.55);
      outline-offset: 3px;
    }

    /* "Browse all" tile */
    .cover.more {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: 1px solid var(--line);
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }
    .cover.more:hover,
    .cover.more:focus-visible {
      color: var(--fg);
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.03);
      outline: none;
    }
    .more-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
    }

    /* Library dialog */
    dialog.lib {
      width: min(720px, 94vw);
      max-height: 84svh;
      margin: 6vh auto 0;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #111113;
      color: var(--fg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    dialog.lib:not([open]) { display: none; }
    dialog.lib::backdrop {
      background: rgba(6, 6, 7, 0.66);
      -webkit-backdrop-filter: blur(5px);
      backdrop-filter: blur(5px);
    }

    .lib-list {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.16) transparent;
    }
    .lib-list::-webkit-scrollbar { width: 9px; }
    .lib-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    .lib-list::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.24); background-clip: padding-box; }

    .lib-head {
      flex: none;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      padding: 0.85rem 0.95rem;
      border-bottom: 1px solid var(--line);
    }
    .lib-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.7rem;
    }
    .lib-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem;
    }
    .seg {
      flex: none;
      display: inline-flex;
      padding: 3px;
      gap: 2px;
      background: var(--tile);
      border: 1px solid var(--line);
      border-radius: 9px;
    }
    .seg-btn {
      appearance: none;
      border: none;
      background: none;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.03em;
      padding: 0.4rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s ease, background 0.15s ease;
    }
    .seg-btn:hover { color: var(--dim); }
    .seg-btn.is-active {
      color: #0c0c0d;
      background: #ececed;
    }
    .seg-btn:focus-visible { outline: 2px solid rgba(255, 255, 255, 0.4); outline-offset: 2px; }
    .lib-title { display: flex; flex-direction: column; line-height: 1.2; }
    .lib-h { font-size: 0.95rem; font-weight: 600; }
    .lib-sub {
      font-family: var(--mono);
      font-size: 0.66rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .lib-search {
      flex: 1;
      min-width: 0;
      background: var(--tile);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.55rem 0.7rem;
      color: var(--fg);
      font: inherit;
      font-size: 0.9rem;
    }
    .lib-search::placeholder { color: var(--muted); }
    .lib-search:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.28);
    }
    .lib-close {
      flex: none;
      width: 2rem;
      height: 2rem;
      display: grid;
      place-items: center;
      background: none;
      border: none;
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.95rem;
      cursor: pointer;
      transition: color 0.15s ease, background 0.15s ease;
    }
    .lib-close:hover { color: var(--fg); background: rgba(255, 255, 255, 0.06); }

    .lib-list {
      flex: 1;
      overflow-y: auto;
      margin: 0;
      padding: 0.35rem;
      list-style: none;
      display: block;
    }
    .lib-item { border-radius: 8px; }
    .lib-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.45rem 0.55rem;
      background: none;
      border: none;
      border-radius: 8px;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 0.12s ease;
    }
    .lib-row:hover,
    .lib-row:focus-visible {
      background: rgba(255, 255, 255, 0.045);
      outline: none;
    }
    .lib-row .thumb {
      flex: none;
      width: 84px;
      aspect-ratio: 231 / 87;
      object-fit: cover;
      border-radius: 4px;
      background: var(--tile);
    }
    .lib-row .rn {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.94rem;
    }
    .lib-row .rh {
      flex: none;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .lib-row[aria-expanded="true"] { background: rgba(255, 255, 255, 0.045); }
    .lib-row[aria-expanded="true"] .rh { color: var(--dim); }

    .lib-info[hidden] { display: none; }
    .lib-info {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.45rem 1.4rem;
      padding: 0.35rem 0.6rem 0.85rem calc(84px + 1.3rem);
      font-size: 0.86rem;
      color: var(--dim);
    }
    .lib-info .k {
      font-family: var(--mono);
      font-size: 0.64rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 0.45rem;
    }
    .lib-link {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
      padding-bottom: 1px;
    }
    .lib-link:hover { border-color: rgba(255, 255, 255, 0.4); }

    .lib-empty {
      margin: 0;
      padding: 1.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 520px) {
      dialog.lib { width: 94vw; max-height: 86svh; margin: 3vh auto 0; }
    }

    /* Interests band: anime cards | song cards | manga */
    .band {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(1.25rem, 3vw, 2.25rem);
      margin-top: clamp(1.5rem, 3.5vh, 2.25rem);
    }
    .band h2 { margin-bottom: 0.85rem; }

    /* square (album) cover variant */
    .cover.sq { aspect-ratio: 1 / 1; }

    /* fetched-artwork cards */
    .cover.art { position: relative; }
    .cover.art .art-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .cover.art .art-img.loaded { opacity: 0.94; }
    .cover.art:hover .art-img.loaded,
    .cover.art:focus-visible .art-img.loaded { opacity: 1; }
    .art-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      text-align: center;
      padding: 0.6rem;
      font-size: 0.78rem;
      line-height: 1.25;
      color: var(--dim);
    }
    .art-fallback .fa {
      font-family: var(--mono);
      font-size: 0.66rem;
      color: var(--muted);
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    li {
      font-size: clamp(0.98rem, 2.1vw, 1.06rem);
      line-height: 1.3;
      color: var(--dim);
      transition: color 0.15s ease;
    }
    li:hover { color: var(--fg); }

    footer {
      margin-top: clamp(1.5rem, 3.5vh, 2.25rem);
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    /* Tablet — cards wrap into a grid */
    @media (max-width: 760px) {
      .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    }

    /* Mobile — Steam-app style grid, page scrolls */
    @media (max-width: 760px) {
      .band { grid-template-columns: 1fr; gap: 1.75rem; }
    }
    @media (max-width: 520px) {
      body { place-items: start center; }
      .cards { grid-template-columns: repeat(3, 1fr); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      .cover:hover, .cover:focus-visible { transform: none; }
    }
  </style>
</head>

    <dialog id="lib" class="lib" aria-label="Game library">
      <div class="lib-head">
        <div class="lib-top">
          <div class="lib-title">
            <span class="lib-h">Library</span>
            <span class="lib-sub" data-count>445 games</span>
          </div>
          <button type="button" id="libClose" class="lib-close" aria-label="Close">✕</button>
        </div>
        <div class="lib-controls">
          <input id="libSearch" class="lib-search" type="search" placeholder="Search games…" autocomplete="off" spellcheck="false" aria-label="Search games" />
          <div class="seg" role="group" aria-label="Sort games">
            <button type="button" class="seg-btn is-active" data-sort="az" aria-pressed="true">A–Z</button>
            <button type="button" class="seg-btn" data-sort="played" aria-pressed="false">Most played</button>
          </div>
        </div>
      </div>
      <ul id="libList" class="lib-list"></ul>
      <p id="libEmpty" class="lib-empty" hidden>No games match that search.</p>
    </dialog>
  </main>

  <script src="games.js"></script>
  <script>
    (function () {
      var games = window.GAMES || [];
      var meta = window.GAMES_META || { count: games.length, totalHours: 0 };
      var dlg = document.getElementById('lib');
      var listEl = document.getElementById('libList');
      var emptyEl = document.getElementById('libEmpty');
      var searchEl = document.getElementById('libSearch');
      var openBtn = document.getElementById('openLib');
      var closeBtn = document.getElementById('libClose');

      var nf = new Intl.NumberFormat('en-US');
      function fmtHours(h) {
        if (!h) return '—';
        return (h >= 10 ? nf.format(Math.round(h)) : String(h)) + 'h';
      }
      function cap(id) {
        return 'https://cdn.cloudflare.steamstatic.com/steam/apps/' + id + '/capsule_231x87.jpg';
      }

      // fill counts
      document.querySelectorAll('[data-count]').forEach(function (el) {
        el.textContent = nf.format(meta.count) + ' games';
      });
      var fc = document.querySelector('[data-footcount]'); if (fc) fc.textContent = nf.format(meta.count);
      var fh = document.querySelector('[data-foothours]'); if (fh) fh.textContent = nf.format(meta.totalHours);

      // build rows
      var items = [];
      games.forEach(function (g, i) {
        var li = document.createElement('li');
        li.className = 'lib-item';
        li.dataset.n = g.name.toLowerCase();

        var row = document.createElement('button');
        row.type = 'button';
        row.className = 'lib-row';
        row.setAttribute('aria-expanded', 'false');
        row.innerHTML =
          '<img class="thumb" loading="lazy" alt="" src="' + cap(g.id) + '" onerror="this.style.visibility=\'hidden\'">' +
          '<span class="rn">' + esc(g.name) + '</span>' +
          '<span class="rh">' + fmtHours(g.hours) + '</span>';

        var info = document.createElement('div');
        info.className = 'lib-info';
        info.hidden = true;
        var parts = [];
        parts.push(fact('Playtime', g.hours ? fmtHours(g.hours) + ' played' : 'Never played'));
        if (g.rel) parts.push(fact('Released', g.rel.slice(0, 4)));
        if (g.meta != null) parts.push(fact('Metascore', String(g.meta)));
        if (g.user != null) parts.push(fact('Users', g.user + '%'));
        info.innerHTML = parts.join('') +
          '<a class="lib-link" href="https://store.steampowered.com/app/' + g.id + '/" target="_blank" rel="noopener">Open in Steam →</a>';

        row.addEventListener('click', function () {
          var open = row.getAttribute('aria-expanded') === 'true';
          row.setAttribute('aria-expanded', open ? 'false' : 'true');
          info.hidden = open;
        });

        li.appendChild(row);
        li.appendChild(info);
        items.push({ li: li, key: g.name.toLowerCase().replace(/^[^a-z0-9]+/i, ''), hours: g.hours });
      });
      applySort('az');

      function applySort(mode) {
        var arr = items.slice();
        if (mode === 'played') arr.sort(function (a, b) { return b.hours - a.hours || a.key.localeCompare(b.key); });
        else arr.sort(function (a, b) { return a.key.localeCompare(b.key); });
        var f = document.createDocumentFragment();
        arr.forEach(function (it) { f.appendChild(it.li); });
        listEl.appendChild(f);
      }

      Array.prototype.forEach.call(document.querySelectorAll('.seg-btn'), function (btn) {
        btn.addEventListener('click', function () {
          Array.prototype.forEach.call(document.querySelectorAll('.seg-btn'), function (b) {
            var on = b === btn;
            b.classList.toggle('is-active', on);
            b.setAttribute('aria-pressed', on ? 'true' : 'false');
          });
          applySort(btn.dataset.sort);
        });
      });

      function esc(s) {
        return s.replace(/[&<>"]/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
        });
      }
      function fact(k, v) {
        return '<span class="f"><span class="k">' + k + '</span>' + esc(v) + '</span>';
      }

      // search filter
      searchEl.addEventListener('input', function () {
        var q = searchEl.value.trim().toLowerCase();
        var shown = 0;
        for (var i = 0; i < listEl.children.length; i++) {
          var li = listEl.children[i];
          var match = !q || li.dataset.n.indexOf(q) !== -1;
          li.hidden = !match;
          if (match) shown++;
        }
        emptyEl.hidden = shown !== 0;
      });

      function open() {
        if (typeof dlg.showModal === 'function') dlg.showModal();
        else dlg.setAttribute('open', '');
        searchEl.focus();
      }
      function close() { dlg.close(); }

      openBtn.addEventListener('click', open);
      closeBtn.addEventListener('click', close);
      // click on backdrop closes
      dlg.addEventListener('click', function (e) {
        if (e.target === dlg) close();
      });
    })();
  </script>

  <script>
    // Load anime posters (Jikan) and song album art (iTunes) client-side, cached in localStorage.
    (function () {
      function cacheGet(k) { try { return localStorage.getItem(k) || ''; } catch (e) { return ''; } }
      function cacheSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

      function apply(el, url) {
        if (!url) return;
        var img = el.querySelector('.art-img');
        if (!img) return;
        img.onload = function () {
          img.classList.add('loaded');
          var fb = el.querySelector('.art-fallback');
          if (fb) fb.style.display = 'none';
        };
        img.onerror = function () { img.removeAttribute('src'); };
        img.src = url;
      }

      function jsonp(url, cb) {
        var name = '__jp' + Math.random().toString(36).slice(2);
        var s = document.createElement('script');
        var done = false;
        window[name] = function (data) { done = true; cleanup(); cb(data); };
        function cleanup() { try { delete window[name]; } catch (e) { window[name] = undefined; } if (s.parentNode) s.parentNode.removeChild(s); }
        s.onerror = function () { if (!done) { cleanup(); cb(null); } };
        s.src = url + (url.indexOf('?') === -1 ? '?' : '&') + 'callback=' + name;
        document.head.appendChild(s);
        setTimeout(function () { if (!done) { cleanup(); cb(null); } }, 8000);
      }

      // Anime — Jikan v4 (CORS-enabled)
      [].slice.call(document.querySelectorAll('[data-anime]')).forEach(function (el, i) {
        var q = el.getAttribute('data-anime');
        var key = 'art:anime:' + q;
        var cached = cacheGet(key);
        if (cached) { apply(el, cached); return; }
        setTimeout(function () {
          fetch('https://api.jikan.moe/v4/anime?limit=1&sfw&q=' + encodeURIComponent(q))
            .then(function (r) { return r.json(); })
            .then(function (d) {
              var a = d && d.data && d.data[0];
              if (!a) return;
              var im = a.images && a.images.jpg && (a.images.jpg.large_image_url || a.images.jpg.image_url);
              if (im) { apply(el, im); cacheSet(key, im); }
              if (a.url) el.setAttribute('href', a.url);
            })
            .catch(function () {});
        }, i * 450); // stagger for Jikan rate limit
      });

      // Manga — Jikan v4 (CORS-enabled). Pin ambiguous titles by exact MAL id.
      [].slice.call(document.querySelectorAll('[data-manga]')).forEach(function (el, i) {
        var id = el.getAttribute('data-manga-id');
        var q = el.getAttribute('data-manga');
        var key = 'art:manga:' + (id || q);
        var cached = cacheGet(key);
        if (cached) { apply(el, cached); return; }
        var url = id
          ? 'https://api.jikan.moe/v4/manga/' + id
          : 'https://api.jikan.moe/v4/manga?limit=1&q=' + encodeURIComponent(q);
        setTimeout(function () {
          fetch(url)
            .then(function (r) { return r.json(); })
            .then(function (d) {
              var a = d && d.data;
              if (Array.isArray(a)) a = a[0];
              if (!a) return;
              var im = a.images && a.images.jpg && (a.images.jpg.large_image_url || a.images.jpg.image_url);
              if (im) { apply(el, im); cacheSet(key, im); }
              if (!id && a.url) el.setAttribute('href', a.url);
            })
            .catch(function () {});
        }, 1400 + i * 450); // stagger after anime calls for Jikan rate limit
      });

      // Songs — iTunes Search (JSONP to sidestep CORS)
      [].slice.call(document.querySelectorAll('[data-song]')).forEach(function (el, i) {
        var q = el.getAttribute('data-song');
        var key = 'art:song:' + q;
        var cached = cacheGet(key);
        if (cached) { apply(el, cached); return; }
        setTimeout(function () {
          jsonp('https://itunes.apple.com/search?entity=song&limit=1&term=' + encodeURIComponent(q), function (d) {
            var s = d && d.results && d.results[0];
            if (!s) return;
            var art = s.artworkUrl100;
            if (art) { art = art.replace('100x100bb', '600x600bb'); apply(el, art); cacheSet(key, art); }
          });
        }, i * 300);
      });
    })();
  </script>
</body>
</html>
